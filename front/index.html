<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Cestas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f6f3;
    }

    /* MENU */
    header {
      background-color: #fff;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    nav a:hover {
      color: #c59d5f;
    }

    /* BANNER */
    .banner {
      height: 300px;
      background: url("banner.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 32px;
      font-weight: bold;
    }

    /* CONTEÚDO */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* CARD */
    .cesta {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .imagem {
      width: 120px;
      height: 120px;
      background-color: #eee;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .imagem img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      flex: 1;
    }

    .nome {
      font-size: 18px;
      font-weight: bold;
    }

    .descricao {
      color: #666;
      margin: 5px 0;
    }

    .preco {
      color: #c59d5f;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <!-- MENU -->
  <header>
    <h1>Grãos & Cestas</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Catálogo</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <!-- BANNER -->
  <div class="banner">
    Café da manhã especial 🧺
  </div>

  <!-- CONTEÚDO -->
  <div class="container">
    <h2>Catálogo de Cestas</h2>

    <div id="lista"></div>
  </div>

  <script>
    const API = "http://localhost:3000/cestas";

    async function listarCestas() {
      const resposta = await fetch(API);
      const dados = await resposta.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      dados.forEach(cesta => {
        const div = document.createElement("div");
        div.className = "cesta";

        div.innerHTML = `
          <div class="imagem">
            <img src="${cesta.nome === 'Cesta Premium' ? 'cesta_premium.jpg' : 'cesta.jpg'}">
          </div>
          <div class="info">
            <div class="nome">${cesta.nome}</div>
            <div class="descricao">${cesta.descricao}</div>
            <div class="preco">R$ ${cesta.preco}</div>
          </div>
        `;

        lista.appendChild(div);
      });
    }

    listarCestas();
  </script>

</body>
</html>
